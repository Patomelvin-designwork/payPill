<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPill</title>
  <script>
    // Single Page App redirect for GitHub Pages / static hosting
    // Redirects all 404s to index.html with the original path preserved
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    
    // Store the original path in sessionStorage so the app can handle it
    sessionStorage.setItem('redirectPath', path + search + hash);
    
    // Redirect to root
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
